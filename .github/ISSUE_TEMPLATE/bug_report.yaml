name: "Bug Report"
description: "Use this template to report a bug or issue."
title: "Bug: [Enter a concise title here]"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "### Please provide the following details to help us understand and address the issue."
  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "Provide a concise summary of the issue."
      placeholder: "Brief summary of the problem."
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the issue in detail, including any relevant context and background."
      placeholder: "Enter a detailed description."
  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: "How severe is the issue?"
      options:
        - Low
        - Medium
        - High
        - Critical
  - type: input
    id: os
    attributes:
      label: "Operating System"
      description: "Which operating system are you using?"
      placeholder: "e.g., Windows 10, macOS Monterey, Ubuntu 22.04"
  - type: input
    id: browser
    attributes:
      label: "Browser"
      description: "Which browser and version are you using?"
      placeholder: "e.g., Chrome 117, Firefox 118"
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Provide a list of steps to reproduce the issue."
      placeholder: "- Step 1: ...\n- Step 2: ...\n- Step 3: ..."
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "Describe what you expected to happen."
      placeholder: "Enter the expected outcome."
  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      description: "Describe what actually happened."
      placeholder: "Enter the actual outcome."
  - type: textarea
    id: additional_information
    attributes:
      label: "Additional Information"
      description: "Provide any other details or context that may help."
      placeholder: "Enter additional details or context."
