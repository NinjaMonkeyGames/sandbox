name: Bug Report Form
description: Please provide the details of the bug you're experiencing.
labels: ["bug"]
body:
  # 1) Title (handled by GitHub, not in form)
  
  # 2) Drop-down OS Selection
  - type: dropdown
    id: operating_system
    attributes:
      label: "Operating System"
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  # 3) Description of the Problem (textarea)
  - type: textarea
    id: problem_description
    attributes:
      label: "Description of the Problem"
      placeholder: "Please describe the problem you're facing."
    validations:
      required: true

  # 4) Expected Behavior (textarea)
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  # 5) Actual Behavior (textarea)
  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      placeholder: "What actually happened?"
    validations:
      required: true

  # 6) I Agree to the Terms of the Submission (checkbox)
  - type: checkbox
    id: agree_terms
    attributes:
      label: "I agree to the terms of the submission"
    validations:
      required: true

  # 7) Bug Type (Dropdown for Bug Type Selection)
  - type: dropdown
    id: bug_type
    attributes:
      label: "Bug Type"
      options:
        - Documentation Error
        - Application Bug
    validations:
      required: true
