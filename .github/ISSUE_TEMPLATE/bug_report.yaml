name: "Bug Report"
description: "Use this template to report a bug or issue with the system."
body:
  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "Provide a brief summary of the issue."
      placeholder: "Enter a concise summary of the problem."
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Provide detailed information about the issue, including steps to reproduce it."
      placeholder: "Enter a detailed description of the problem."
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: "Select the severity level of the issue."
      options:
        - Low
        - Medium
        - High
        - Critical
      required: true
  - type: input
    id: os
    attributes:
      label: "Operating System"
      description: "Specify the operating system (e.g., Windows, macOS, Linux)."
      placeholder: "Enter the operating system."
      required: true
  - type: input
    id: browser
    attributes:
      label: "Browser"
      description: "Specify the browser and version (e.g., Chrome 117, Firefox 118)."
      placeholder: "Enter the browser name and version."
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "List the steps required to reproduce the issue."
      placeholder: "- Step 1\n- Step 2\n- Step 3"
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "Describe what you expected to happen."
      placeholder: "Enter the expected outcome."
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      description: "Describe what actually happened."
      placeholder: "Enter the observed outcome."
      required: true
  - type: textarea
    id: additional_information
    attributes:
      label: "Additional Information"
      description: "Provide any other details or context that might help us address the issue."
      placeholder: "Enter additional details."
      required: false
  - type: file
    id: attachments
    attributes:
      label: "Attachments"
      description: "Attach relevant files, logs, or screenshots."
      multiple: true
