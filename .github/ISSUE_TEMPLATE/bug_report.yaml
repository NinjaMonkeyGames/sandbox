########################################################################################################################
#                                                      BUG REPORT                                                      #
########################################################################################################################

# Meta Data

name: Bug Report
description: File a bug report
title: "Type problem title here!"
placeholder: email@example.com
labels: ["bug", "triage"]
projects: ["NinjaMonkeyGames/sandbox"]
assignees:
  - monkey-knuckles

# Introduction Text

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue!
        Please fill out the form below to provide detailed information about the bug.

# Email Input

  - type: input
    id: contact-email
    attributes:
      label: Contact Email
      description: Please provide an email where we can reach you if more information is needed.
      placeholder: email@example.com
    validations:
      required: true  # Email is required

# OS Selection

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true  # OS selection is required

# Browser Selection

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: What browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Microsoft Edge
        - Opera
        - Other
    validations:
      required: true  # Browser selection is required

# Bug Type

  - type: dropdown
    id: bug-type
    attributes:
      label: Bug Type
      description: Select the type of issue you are reporting.
      options:
        - Application Bug
        - Documentation Problem
    validations:
      required: true  # Bug type selection is required

# Problem Summary

  - type: textarea
    id: problem-summary
    attributes:
      label: Problem Summary
      description: Please describe the issue in a few sentences.
      placeholder: A brief summary of the issue.
    validations:
      required: true  # Summary is required

# Expected Behavior

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true  # Expected behavior is required

# Steps To Reproduce

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Please list the steps to reproduce the issue.
      placeholder: "1. \n2. \n3."
    validations:
      required: true  # Steps to reproduce are required

# Actual Behavior

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? 
    validations:
      required: true  # Actual behavior is required

# Other Information

  - type: textarea
    id: other-information
    attributes:
      label: Other Information
      description: Provide any additional information or context that might help us resolve the issue.
      placeholder: Additional context, error messages, or anything else that may be helpful.
    validations:
      required: false  # This field is optional

# Agree to terms

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this bug report, you agree to follow our [Code of Conduct](https://example.com).
      options:
        - label: I agree to follow this project's Code of Conduct
    validations:
      required: true  # Checkbox is required to submit the issue
