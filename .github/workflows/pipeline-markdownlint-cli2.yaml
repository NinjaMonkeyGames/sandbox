version: '1.0'

jobs:
  lint:
    docker:
      - image: monkeyknuckles/commitlint:19.5.0
    steps:
      - checkout
      - run:
          name: Run CommitLint
          command: |
            echo "Running CommitLint..."
            commitlint --from=HEAD~1 --to=HEAD

workflows:
  version: 1
  lint:
    jobs:
      - lint
