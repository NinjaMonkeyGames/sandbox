name: CommitLint

# PERFORMS ACTIONS ON SUCCESSFUL PULL OR PUSH
on: [push, pull_request]

# SETS DISTRIBUTION TO USE AND INITIALIZES LINTING JOB
jobs:
  lint:
    runs-on: ubuntu-latest

    # Use a container for running CommitLint
    container:
      image: node:22.9.0  # Using the Node.js container

    # STEPS REQUIRED IN ORDER TO LINT COMMIT MESSAGES
    steps:

      # CHECKOUT CODE
      - name: Checkout code
        uses: actions/checkout@v3

      # SETUP NODE.JS
      - name: Set up Node.js
        run: npm install -g @commitlint/cli@19.5.0 @commitlint/config-conventional@19.5.0

      # RUN COMMITLINT
      - name: Run CommitLint
        run: |
          echo "Running CommitLint..."
          commitlint --from=HEAD~1 --to=HEAD
