name: CommitLint Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t monkeyknuckles/commitlint .

      - name: Run CommitLint in Container
        run: |
          docker run --rm monkeyknuckles/commitlint /bin/bash -c "commitlint --config /app/commitlint.config.js --from HEAD~1 --to HEAD"
