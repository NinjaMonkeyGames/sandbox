name: CommitLint

on:
  push:
    branches:
      - main  # Change this to your default branch if necessary
  pull_request:
    branches:
      - main  # Change this to your default branch if necessary

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22.9.0'

      - name: Install CommitLint
        run: |
          npm install -g @commitlint/cli@19.5.0 @commitlint/config-conventional@19.5.0

      - name: Run CommitLint
        run: |
          echo "Running CommitLint..."
          commitlint --from=HEAD~1 --to=HEAD
``
