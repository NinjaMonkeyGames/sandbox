# LINT COMMIT MESSAGES WITH COMMITLINT

name: Commit Lint

# PERFORMS ACTIONS ON SUCCESSFUL PULL OR PUSH

on: [push, pull_request]

# SETS DISTRIBUTION TO USE AND INITIALIZES LINTING JOB

jobs:
  lint:
    runs-on: ubuntu-latest

    container:
      image: monkeyknuckles/commitlint

    # STEPS REQUIRED IN ORDER TO LINT COMMIT MESSAGES

    steps:

    #other
      - name: test
        run: ls -a

    # CHECKOUT CODE
      - name: Checkout code
        uses: actions/checkout@v3

    # LINT COMMIT MESSAGES
      - name: Run commitlint
        run: commitlint --from=HEAD~1 --to=HEAD
