name: CommitLint Check

# Trigger on push or pull request
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    # Use monkeyknuckles/commitlint Docker image
    container:
      image: monkeyknuckles/commitlint

    steps:
      # Checkout code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Dynamically set Git safe directory to avoid ownership errors
      - name: Set Git Safe Directory
        run: git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}

      # Run CommitLint to lint the commit messages in the repository
      - name: Run commitlint
        run: commitlint --config /app/commitlint.config.js --from HEAD~1 --to HEAD
