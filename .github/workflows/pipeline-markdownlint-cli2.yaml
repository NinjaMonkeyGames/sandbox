# LINT COMMIT TEXT WITH COMMITLINT

name: Commit Lint

# PERFORMS ACTIONS ON SUCCESSFUL PULL OR PUSH

on: [push, pull_request]

# SETS DISTRIBUTION TO USE AND INITIALIZES LINTING JOB

jobs:
  lint:
    runs-on: ubuntu-latest
    
    container:
      image: monkeyknuckles/commitlint

    # STEPS REQUIRED IN ORDER TO LINT COMMIT MESSAGE

    steps:

    # CHECKOUT CODE

      - name: Checkout code
        uses: actions/checkout@v3

    # COPY CONFIGURATION FILE CONTAINING COMMITLINT LINTING RULES FROM THE CONTAINER TO THE WORKSPACE

      - name: Copy commitlint config
        run: cp /app/commitlint.config.js $GITHUB_WORKSPACE

    # MARK DIRECTORY AS SAFE TO AVOID SECURITY ERROR

      - name: Mark directory as safe to avoid error
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

    # LINT LAST COMMIT

      - name: Run commitlint
        run: commitlint --from=origin/${{ github.event.repository.default_branch }} --to=$GITHUB_SHA

