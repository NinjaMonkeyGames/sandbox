# BUILD DOCKER CONTAINER FROM FILES IN THE PROJECT

name: Build and push Docker Image # Label that will appear on GitHub actions as the workflow name

on: # Trigger on push to main branch
  [push]  # This line allows the workflow to run push event

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # CHECKOUT CODE
    - name: Checkout code
      uses: actions/checkout@v3

    # SET UP DOCKER BUILDX
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # LOG IN TO DOCKERHUB
    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PAT }}

    # BUILD AND PUSH DOCKER IMAGE WITH SBOM AND PROVENANCE
    - name: Build and push Docker image with SBOM and Provenance
      run: |
        docker buildx build \
          --sbom=true \
          --provenance=true \
          --tag monkeyknuckles/markdownlint-cli2:latest \
          --push .
