# BUILD DOCKER CONTAINER FROM FILES IN THE PROJECT

name: Build and push Docker Image

on:                     

jobs:
  build:
    runs-on: ubuntu-latest 

   # INITIALISE BUILD STEPS

    steps:

    # CHECKOUT CODE

    - name: Checkout code       
      uses: actions/checkout@v3

    # PREPARE BUILDX

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # LOG IN TO DOCKERHUB

    # Sets a label 'Login to Docker Hub' which will be displayed on Github Actions. Utilises GitHubs predefined docker login script to login to Docker Hub. Uses Dockerhub username and PAT (personal access token) which is stored on GitHub as an environment secrets.  

    - name: Log in to DockerHub                
      uses: docker/login-action@v3              
      with:                                      
        username: ${{ secrets.DOCKER_USERNAME }} 
        password: ${{ secrets.DOCKER_HUB_PAT }}  

    # BUILD AND PUSH DOCKER IMAGE WITH SBOM AND PROVENANCE

    # Sets a label 'Build and push Docker image with SBOM and provenance '. Execute buildx command with switches to build Docker image with SBOM and provenance.

    - name: Build and push Docker image with SBOM and provenance 
      run: |                                                     
        docker buildx build \                                    
          --sbom=true \
          --provenance=true \
          --tag monkeyknuckles/markdownlint-cli2:latest \
          --push .
