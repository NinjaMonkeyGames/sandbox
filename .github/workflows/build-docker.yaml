# Build and push Docker container only if relevant files change

name: Build and Push Docker Image

# Performs Actions on push or pull requests when specific files are modified

on:
  push:
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - 'src/**' # Adjust paths based on project structure
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - 'src/**' # Adjust paths based on project structure

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout Code

    - name: Checkout code
      uses: actions/checkout@v3

    # Set Up Docker Buildx

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Log In To Docker Hub

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_SANDBOX_PAT }}

    # Build And Push Docker Image With Sbom And Provenance. (Run only if Docker file has been modified)

    - name: Build and push Docker image with SBOM and Provenance
      if: github.event.before != github.event.after
      run: |
        docker buildx build \
          --sbom=true \
          --provenance=true \
          --tag monkeyknuckles/markdownlint-cli2:latest \
          --push .
