# BUILD DOCKER CONTAINER FROM FILES IN THE PROJECT

name: Build and Push Docker Image

# Trigger on push to main branch and pull requests
on: 
  [push, pull_request]  # This line allows the workflow to run on both events

# Allow concurrent runs and manage them by branch reference
concurrency:
  group: 'docker-build-${{ github.ref }}'  # Unique group for this workflow
  cancel-in-progress: false  # Set to true to cancel previous runs if a new one starts

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # CHECKOUT CODE
    - name: Checkout code
      uses: actions/checkout@v3

    # SET UP DOCKER BUILDX
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # LOG IN TO DOCKERHUB
    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PAT }}

    # BUILD AND PUSH DOCKER IMAGE WITH SBOM AND PROVENANCE
    - name: Build and push Docker image with SBOM and Provenance
      run: |
        docker buildx build \
          --sbom=true \
          --provenance=true \
          --tag monkeyknuckles/markdownlint-cli2:latest \
          --push .