name: Release Deployment

on:
  workflow_call:
    # Receives the call from CI Controller

jobs:
  # 1. Linting Jobs (Running in parallel)
  commit-lint:
    uses: ./.github/workflows/commitlint.yaml
    secrets: inherit

  markdown-lint:
    uses: ./.github/workflows/markdownlint.yaml
    secrets: inherit

  es-lint:
    uses: ./.github/workflows/eslint.yaml
    secrets: inherit

  # 2. Deployment Job (Wait for linting to pass)
  deploy-release:
    name: Execute Release Build
    needs: [commit-lint, markdown-lint, es-lint]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Deployment Simulation
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 STARTING RELEASE DEPLOYMENT"
          echo "-------------------------------------------------------"
          echo "✅ Release deployment marked as COMPLETE."
          echo "-------------------------------------------------------"