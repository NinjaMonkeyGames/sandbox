# Test if GameMaker Project can be compiled without error.
name: gm-cli

on:
  workflow_call:

jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: monkeyknuckles/gm-cli
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          # 1. Create dummy files to bypass service management errors
          echo "#!/bin/sh" > /usr/sbin/update-rc.d
          echo "exit 0" >> /usr/sbin/update-rc.d
          chmod +x /usr/sbin/update-rc.d
          
          echo "#!/bin/sh" > /usr/sbin/invoke-rc.d
          echo "exit 0" >> /usr/sbin/invoke-rc.d
          chmod +x /usr/sbin/invoke-rc.d
          
          # 2. Update and install packages
          # Added linuxdeploy and patchelf
          apt-get update
          apt-get install -y unzip xvfb linuxdeploy patchelf

      - name: Run gm-cli
        working-directory: ./grid-utility-professional
        # Wrapped in xvfb-run to provide a virtual display for the GameMaker CLI
        run: xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" npx gm-cli run