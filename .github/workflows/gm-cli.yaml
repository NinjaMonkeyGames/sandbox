name: Run gm-cli on Feature Push

on:
  push:
    branches:
      - 'feature/**'

jobs:
  run-gm:
    runs-on: ubuntu-latest
    container:
      image: monkeyknuckles/gm-cli:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Prepare Workspace
        run: |
          cp -a /grid-utility/. .

      - name: Run gm-cli
        run: |
          gm-cli compile