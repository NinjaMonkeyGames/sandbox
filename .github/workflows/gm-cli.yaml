name: Run gm-cli on Feature Push

on:
  push:
    # This pattern matches any branch that starts with 'feature/'
    branches:
      - 'feature/**'

jobs:
  run-gm:
    runs-on: ubuntu-latest
    container:
      image: monkeyknuckles/gm-cli:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run gm-cli
        run: |
          gm-cli compile