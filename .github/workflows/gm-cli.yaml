name: Run gm-cli on Feature Push

on:
  push:
    branches:
      - 'feature/**'

jobs:
  run-gm:
    runs-on: ubuntu-latest
    container:
      image: monkeyknuckles/gm-cli:latest
    # This sets the working directory for all steps in this job
    defaults:
      run:
        working-directory: /grid-utility
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run gm-cli
        run: |
          gm-cli compile