name: gm-cli

on:
  workflow_call:

jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: monkeyknuckles/gm-cli
    steps:
      - uses: actions/checkout@v6

        name: gm-cli

        on:
          workflow_call:

        jobs:
          build-test:
            runs-on: ubuntu-latest
            container:
              image: monkeyknuckles/gm-cli
            steps:
              - uses: actions/checkout@v6

              - name: Install dependencies
                run: |
                  apt-get update
                  # --no-install-recommends: keeps it lean
                  # --no-triggers: skips the post-install scripts that crash on missing rc services
                  apt-get install -y --no-install-recommends --no-triggers unzip xvfb
                  
              - name: Run gm-cli
                working-directory: ./grid-utility-professional
                # Wrapped in xvfb-run
                run: xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" npx gm-cli run