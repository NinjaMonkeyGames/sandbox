name: gm-cli

on:
  workflow_call:
jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: monkeyknuckles/gm-cli
    steps:
      - uses: actions/checkout@v6

      - name: Run gm-cli
        # This tells the runner to execute the command inside /grid-utility
        working-directory: /grid-utility
        run: gm-cli compile